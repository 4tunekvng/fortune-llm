name = "fortune-llm"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Default OSS model used by the Workers AI tier. Override per-deploy via
# DEFAULT_OSS_MODEL if you want to A/B another OSS model.
# Default Gemini model used by the Gemini tier. Override via
# DEFAULT_GEMINI_MODEL.
[vars]
DEFAULT_OSS_MODEL = "@cf/meta/llama-4-scout-17b-16e-instruct"
DEFAULT_GEMINI_MODEL = "gemini-2.5-flash"

# Free-by-default chain. Paid Anthropic is opt-in only via the consumer
# request setting `metadata.fortune_route="anthropic"`. The three secrets
# below are set with `wrangler secret put`:
#
#   wrangler secret put GATEWAY_TOKEN     # required — token consumer apps send
#   wrangler secret put GEMINI_API_KEY    # recommended — enables Gemini tier (free)
#   wrangler secret put ANTHROPIC_API_KEY # optional — only needed for the paid escape valve
#
# If GEMINI_API_KEY is missing, requests that would have used Gemini fall
# through to the next tier in the chain (or fail if Gemini is the only
# tier). If ANTHROPIC_API_KEY is missing, requests with
# metadata.fortune_route="anthropic" return a 503.

[ai]
binding = "AI"

# Per-backend circuit breaker. Tracks which tiers have blown their
# free-tier quota so subsequent requests skip them instead of repeatedly
# burning a fetch on a guaranteed failure. Create the namespace once:
#
#   wrangler kv namespace create CIRCUIT
#   wrangler kv namespace create CIRCUIT --preview
#
# Then replace the placeholders below with the printed ids. Override
# the trip duration (default 1h) by adding to [vars]:
#   CIRCUIT_TRIP_DURATION_MS = "1800000"   # 30 min
[[kv_namespaces]]
binding = "CIRCUIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

[observability]
enabled = true
