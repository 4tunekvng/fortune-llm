name = "fortune-llm"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Default model per tier. Override any of these in this file to A/B
# without code changes.
[vars]
DEFAULT_OSS_MODEL = "@cf/google/gemma-4-26b-a4b-it"
DEFAULT_GEMINI_MODEL = "gemini-2.5-flash"
DEFAULT_GROQ_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct"
DEFAULT_CEREBRAS_MODEL = "gpt-oss-120b"
DEFAULT_GITHUB_MODELS_MODEL = "openai/gpt-4o-mini"
DEFAULT_MISTRAL_MODEL = "mistral-small-latest"
# OpenRouter free models are heavily contested per-model; pass a list of
# candidates and OpenRouter's `models: []` fallback picks the first
# available. OpenRouter API caps the list at 3 entries — longer lists
# truncate silently in code. Override per-deploy without code change.
DEFAULT_OPENROUTER_MODELS = "deepseek/deepseek-v4-flash:free,openai/gpt-oss-120b:free,qwen/qwen3-coder:free"

# Free-first chain with paid Anthropic as auto-last-resort. Each free
# provider is an independent quota pool, so the more keys you have set,
# the higher the daily ceiling before anthropic is reached.
#
#   wrangler secret put GATEWAY_TOKEN       # required — token consumer apps send
#   wrangler secret put GROQ_API_KEY        # recommended — free, fastest, native tool use
#   wrangler secret put GEMINI_API_KEYS     # recommended — comma-separated for key rotation
#                                           # (or GEMINI_API_KEY for a single key)
#   wrangler secret put OPENROUTER_API_KEY  # recommended — independent free-quota pool
#   wrangler secret put ANTHROPIC_API_KEY   # optional — last-resort when every free
#                                           # tier is exhausted. Omit to make the
#                                           # gateway free-only (503s when dry).
#
# Any unset key disables only its own tier; the chain skips and continues.
# Per-request opt-out of paid: metadata.fortune_route="free".

[ai]
binding = "AI"

# Shared KV namespace for circuit-breaker state, response cache, and
# per-IP rate-limit counters. Three subsystems, three key prefixes:
#   circuit:<tier>          → circuit-breaker state (quota tripped)
#   cache:<sha256-prefix>   → exact-match response cache (24h default)
#   rate:<ip>:<minute>      → per-IP request count (60s buckets)
#
# Create the namespace once:
#   wrangler kv namespace create CIRCUIT
#   wrangler kv namespace create CIRCUIT --preview
#
# Tunables via [vars] (all optional):
#   CIRCUIT_TRIP_DURATION_MS = "1800000"   # circuit breaker trip duration, default 1h
#   CACHE_TTL_SECONDS        = "86400"     # response cache TTL, default 24h, 0 disables
#   RATE_LIMIT_PER_MIN       = "200"       # per-IP req/min, default 200, 0 disables
[[kv_namespaces]]
binding = "CIRCUIT"
id = "2ff745a8a79e47fd8a3728da8f81ce6d"
preview_id = "cf3be286c95c445a88e4bd54a27f5627"

# Durable Object for atomic stats counters. Replaces the old KV-backed
# stats (which lost increments under concurrent traffic and lagged the
# read by up to 60s). One DO instance globally ("stats-singleton") holds
# the daily counters in SQLite; the gateway calls into it via ctx.waitUntil
# so writes don't add latency.
[[durable_objects.bindings]]
name = "STATS_DO"
class_name = "StatsDO"

# Response cache lives in its own DO actor so reads/writes serialize
# through a single process — no KV eventual-consistency lag, no lost
# updates. SQLite-backed under the hood, with a periodic alarm that
# sweeps expired rows.
[[durable_objects.bindings]]
name = "CACHE_DO"
class_name = "CacheDO"

[[migrations]]
tag = "v1-stats-do"
new_sqlite_classes = ["StatsDO"]

[[migrations]]
tag = "v2-cache-do"
new_sqlite_classes = ["CacheDO"]

[observability]
enabled = true
